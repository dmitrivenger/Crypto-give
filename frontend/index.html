<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Donate cryptocurrency to charities and receive tax receipts. Transparent, on-chain, and tax-compliant." />
    <title>CryptoGive — Donate Crypto, Get Tax Receipts</title>
    <!-- Apply theme before React renders to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('theme') || 'dark';
        if (t === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
